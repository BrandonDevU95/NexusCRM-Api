services:
  database:
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE is required}
    container_name: ${POSTGRES_CONTAINER_NAME:?POSTGRES_CONTAINER_NAME is required}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '${POSTGRES_HOST_PORT:?POSTGRES_HOST_PORT is required}:${POSTGRES_CONTAINER_PORT:?POSTGRES_CONTAINER_PORT is required}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  database_test:
    profiles: ['test']
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE is required}
    container_name: ${TEST_POSTGRES_CONTAINER_NAME:?TEST_POSTGRES_CONTAINER_NAME is required}
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB:?TEST_POSTGRES_DB is required}
      POSTGRES_USER: ${TEST_POSTGRES_USER:?TEST_POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:?TEST_POSTGRES_PASSWORD is required}
    ports:
      - '${TEST_POSTGRES_HOST_PORT:?TEST_POSTGRES_HOST_PORT is required}:${POSTGRES_CONTAINER_PORT:?POSTGRES_CONTAINER_PORT is required}'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  pgadmin:
    profiles: ['devtools']
    image: ${PGADMIN_IMAGE:?PGADMIN_IMAGE is required}
    container_name: ${PGADMIN_CONTAINER_NAME:?PGADMIN_CONTAINER_NAME is required}
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
    ports:
      - '${PGADMIN_HOST_PORT:?PGADMIN_HOST_PORT is required}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:?POSTGRES_VOLUME_NAME is required}
  postgres_test_data:
    name: ${TEST_POSTGRES_VOLUME_NAME:?TEST_POSTGRES_VOLUME_NAME is required}
  pgadmin_data:
    name: ${PGADMIN_VOLUME_NAME:?PGADMIN_VOLUME_NAME is required}
